<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONVERT AUDIO</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <a class="back-link" href="/">← back</a>

  <div id="app">
    <header class="app-header">
      <h1 class="app-title">Convert Audio</h1>
      <div class="header-rule"></div>
    </header>

    <div id="drop-zone">
      <input type="file" id="file-input" accept="audio/*" hidden>
      <div id="drop-inner">
        <p class="drop-label">drop audio here</p>
        <p class="drop-or">or</p>
        <button class="action-btn" id="browse-btn">choose file</button>
      </div>
    </div>

    <div id="preview-section" class="hidden">
      <div class="file-meta">
        <p id="file-info"></p>
        <button class="action-btn muted" id="reset-btn">clear</button>
      </div>
      <p id="status-msg" class="hidden"></p>
      <audio id="audio-player" controls class="hidden"></audio>
      <div class="transform-row">
        <button class="transform-btn" data-action="reverse">reverse</button>
        <button class="transform-btn" data-action="half" data-speed-group="half">½×</button>
        <button class="transform-btn" data-action="double" data-speed-group="double">2×</button>
        <button class="transform-btn" data-action="normalize">normalize</button>
        <button class="transform-btn" data-action="mono">mono</button>
        <button class="apply-btn" id="apply-transforms-btn" aria-label="Apply transforms">
          <svg width="18" height="16" viewBox="0 0 18 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M2 10V8a7 7 0 0 1 14 0v2"/>
            <rect x="0" y="10" width="4" height="5" rx="1"/>
            <rect x="14" y="10" width="4" height="5" rx="1"/>
          </svg>
        </button>
        <button class="transform-btn reset-transform hidden" id="reset-transform-btn">reset</button>
      </div>
      <div class="convert-row">
        <button class="convert-btn" data-format="mp3">mp3</button>
        <button class="convert-btn" data-format="wav">wav</button>
      </div>
      <p id="error-msg" class="hidden"></p>
    </div>
  </div>

  <script src="lame.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
